<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <title>Mi Perfil | Aula Señora</title>
    <style>
        .profile-header-banner {
            height: 150px;
            background: linear-gradient(135deg, var(--primary), var(--primary-accent));
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            position: relative;
        }
        .profile-avatar-container {
            margin-top: -60px;
            position: relative;
            z-index: 2;
        }
        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            border: 5px solid white;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            overflow: hidden;
        }
        .profile-content-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-top: -1px; /* Overlap border */
        }
        .form-section {
            padding: var(--space-xl);
        }
        .section-divider {
            height: 1px;
            background: #f1f5f9;
            margin: var(--space-xl) 0;
        }
    </style>
</head>

<body>
    <div layout:fragment="content" class="container py-2xl" style="max-width: 900px; margin: 0 auto;">

        <!-- Back Button -->
        <div class="mb-lg">
            <a th:href="@{/dashboard}" class="text-secondary hover:text-primary flex items-center gap-xs text-sm font-medium transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                Volver al Panel
            </a>
        </div>

        <!-- Success Alert -->
        <div th:if="${param.success}" class="mb-lg p-md rounded-md bg-green-50 border border-green-200 text-green-700 flex items-center gap-sm animate-fade-in">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span class="font-bold">¡Tu perfil se ha actualizado con éxito!</span>
        </div>

        <!-- Profile Wrapper -->
        <div class="profile-content-card overflow-hidden">
            <!-- Header Banner -->
            <div class="profile-header-banner"></div>

            <div class="form-section">
                <!-- Avatar & Basic Info -->
                <div class="flex flex-col items-center mb-xl">
                    <div class="profile-avatar-container">
                        <div class="avatar-circle">
                            <span th:text="${user != null ? #strings.substring(user.firstName, 0, 1) : 'U'}">U</span>
                        </div>
                    </div>
                    <h2 class="mt-md text-2xl font-extrabold text-primary" th:text="${user != null ? user.firstName + ' ' + user.lastName : 'Nombre de Usuario'}">Nombre del Usuario</h2>
                    <p class="text-secondary" th:text="${user != null ? user.email : 'correo@ejemplo.com'}">correo@ejemplo.com</p>
                    <div class="mt-sm">
                        <span class="badge badge-primary" style="padding: 0.2rem 1rem; border-radius: 20px;" th:text="${user != null ? user.rol : 'ESTUDIANTE'}">Estudiante</span>
                    </div>
                </div>

                <div class="section-divider"></div>

                <!-- Form -->
                <form th:action="@{/student/profile/update}" method="post">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-xl">
                        <div>
                            <label class="form-label font-bold text-sm mb-xs block">Nombre(s)</label>
                            <input type="text" name="firstName" class="form-control w-full" th:value="${user != null ? user.firstName : ''}" required>
                        </div>
                        <div>
                            <label class="form-label font-bold text-sm mb-xs block">Apellidos</label>
                            <input type="text" name="lastName" class="form-control w-full" th:value="${user != null ? user.lastName : ''}" required>
                        </div>
                    </div>

                    <div class="mt-xl">
                        <label class="form-label font-bold text-sm mb-xs block">Correo Electrónico (No editable)</label>
                        <input type="email" class="form-control w-full bg-gray-50 cursor-not-allowed" th:value="${user != null ? user.email : ''}" readonly>
                        <p class="text-xs text-secondary mt-xs">Tu correo es tu identificador único en la plataforma.</p>
                    </div>

                    <div class="section-divider"></div>

                    <h4 class="font-bold mb-md text-primary">Preferencias de Estudio</h4>
                    <p class="text-sm text-secondary mb-lg">Marca las áreas donde te gustaría recibir más acompañamiento.</p>

                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-md">
                        <label class="flex items-center gap-md p-md border rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: var(--primary);">
                            <span class="text-sm font-medium">Matemáticas</span>
                        </label>
                        <label class="flex items-center gap-md p-md border rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: var(--primary);">
                            <span class="text-sm font-medium">Física</span>
                        </label>
                        <label class="flex items-center gap-md p-md border rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--primary);">
                            <span class="text-sm font-medium">Química</span>
                        </label>
                        <label class="flex items-center gap-md p-md border rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--primary);">
                            <span class="text-sm font-medium">Biología</span>
                        </label>
                        <label class="flex items-center gap-md p-md border rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--primary);">
                            <span class="text-sm font-medium">Lenguaje</span>
                        </label>
                        <label class="flex items-center gap-md p-md border rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--primary);">
                            <span class="text-sm font-medium">Inglés</span>
                        </label>
                    </div>

                    <div class="mt-2xl pt-xl border-t flex justify-end gap-md">
                        <button type="reset" class="btn btn-outline px-xl">Descartar</button>
                        <button type="submit" class="btn btn-primary px-2xl shadow-lg">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-2xl text-center">
            <button class="text-error text-xs font-bold opacity-60 hover:opacity-100 transition-opacity">Eliminar permanentemente mi cuenta</button>
        </div>

    </div>
</body>

</html>

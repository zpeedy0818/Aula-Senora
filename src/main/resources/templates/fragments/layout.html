<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">Aula Señora</title>

    <!-- Meta Descriptions para SEO y Accesibilidad -->
    <meta name="description" content="Plataforma de acompañamiento académico solidario - Aula Señora">

    <!-- Archivos CSS Globales -->
    <link rel="stylesheet" th:href="@{/css/variables.css(v=2)}" />
    <link rel="stylesheet" th:href="@{/css/styles.css(v=10)}" />
    <link rel="stylesheet" th:href="@{/css/components.css(v=2)}" />

    <!-- AOS (Animaciones) & Toastify (Notificaciones) CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <!-- Custom Page CSS -->
    <th:block layout:fragment="page-css"></th:block>
</head>

<body class="site-wrapper" th:classappend="${#authorization.expression('hasRole(''ROLE_ESTUDIANTE'')') ? 'theme-student' : (#authorization.expression('hasRole(''ROLE_VOLUNTARIO'')') ? 'theme-volunteer' : (#authorization.expression('hasRole(''ROLE_ADMIN'')') ? 'theme-admin' : ''))}">

    <!-- Header Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main Content Area -->
    <main class="site-content" layout:fragment="content">
        <!-- Content will be injected here by specific views -->
    </main>

    <!-- Footer Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Bottom Navigation (Mobile Only) -->
    <div th:replace="~{fragments/bottom-nav :: bottom-nav}"></div>

    <!-- Archivo JS Global -->
    <script th:src="@{/js/main.js}"></script>

    <!-- AOS & Toastify JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Custom Page JS -->
    <th:block layout:fragment="page-js"></th:block>

</body>

</html>

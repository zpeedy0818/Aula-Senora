<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <footer th:fragment="footer" class="main-footer">
        <div class="container footer-content grid grid-cols-1 md:grid-cols-4 gap-md">

            <!-- Brand & Info -->
            <div class="footer-col col-span-1 md:col-span-2">
                <a th:href="@{/}" class="brand-logo flex items-center gap-sm mb-xs">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                        <path d="M6 12v5c3 3 9 3 12 0v-5" />
                    </svg>
                    <span class="brand-text">Aula Señora</span>
                </a>
                <p class="text-sm opacity-80">Apoyo académico solidario.</p>
            </div>

            <!-- Enlaces Esenciales -->
            <div class="footer-col md:col-span-2 flex justify-end gap-xl text-sm" style="align-items: center;">
                <a th:href="@{/contact}" class="footer-link">Contacto</a>
                <a th:href="@{/privacy}" class="footer-link">Privacidad</a>
            </div>

        </div>

        <div class="footer-bottom mt-md pt-sm border-t border-color-muted text-center text-sm opacity-70">
            <p>&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">202X</span> Aula Señora. Proyecto
                educativo por Veruzka, Oscar, Sara y Juan Esteban.</p>
        </div>
    </footer>
</body>

</html>

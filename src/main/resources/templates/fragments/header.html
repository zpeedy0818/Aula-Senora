<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <header th:fragment="header" class="main-header">
        <div class="container navbar flex items-center justify-between">
            <!-- Brand Logo -->
            <a th:href="@{/}" class="brand-logo flex items-center gap-sm">
                <!-- SVG Icon representing Education/Solidarity -->
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                    <path d="M6 12v5c3 3 9 3 12 0v-5" />
                </svg>
                <span class="brand-text">Aula Señora</span>
            </a>

            <!-- Desktop Navigation -->
            <nav class="desktop-nav hidden-mobile">
                <ul class="nav-links flex items-center gap-md" style="margin-bottom:0; list-style:none;">
                    <li><a th:href="@{/}" class="nav-link">Inicio</a></li>

                    <!-- Unauthenticated Users -->
                    <li sec:authorize="!isAuthenticated()">
                        <a th:href="@{/login}" class="btn btn-outline" style="padding: 0.35rem 1rem;">Iniciar Sesión</a>
                    </li>
                    <li sec:authorize="!isAuthenticated()">
                        <a th:href="@{/register}" class="btn btn-primary" style="padding: 0.35rem 1rem;">Regístrate</a>
                    </li>

                    <!-- Authenticated Users -->
                    <li sec:authorize="isAuthenticated()" class="dropdown" style="list-style:none; position: relative;">
                        <button class="nav-link dropdown-toggle flex items-center gap-xs" aria-expanded="false"
                            aria-haspopup="true" style="background:transparent; border:none; cursor:pointer; color:var(--text-primary);"
                            onclick="this.nextElementSibling.classList.toggle('hidden'); event.stopPropagation();">
                            <div class="w-8 h-8 rounded-full bg-primary-light flex items-center justify-center text-primary font-bold text-xs">
                                <span sec:authentication="name">U</span>
                            </div>
                            <span class="hidden-mobile" sec:authentication="name">Usuario</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="m6 9 6 6 6-6" />
                            </svg>
                        </button>
                        <ul class="dropdown-menu hidden shadow-xl animate-scale-in"
                            style="list-style: none; margin: 0; padding: 0.5rem 0; position: absolute; right: 0; top: 100%; background: white; border: 1px solid var(--border-color); border-radius: 12px; min-width: 200px; z-index: 2000;">
                            <li sec:authorize="hasAnyRole('ESTUDIANTE', 'USER')" style="border-bottom: 1px solid #f1f5f9;">
                                <a th:href="@{/student/profile}" class="flex items-center gap-sm" style="padding: 0.75rem 1rem; color: var(--text-primary); text-decoration: none;">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                    Mi Perfil
                                </a>
                            </li>
                            <li sec:authorize="hasAnyRole('VOLUNTARIO', 'USER')">
                                <a th:href="@{/volunteer/dashboard}" class="flex items-center gap-sm" style="padding: 0.75rem 1rem; color: var(--text-primary); text-decoration: none;">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                                    Panel Voluntario
                                </a>
                            </li>
                            <li>
                                <form th:action="@{/logout}" method="post" style="margin: 0;">
                                    <button type="submit" class="logout-btn w-full text-left flex items-center gap-sm" style="padding: 0.75rem 1rem; color: #ef4444; border:none; background:transparent; width:100%; cursor:pointer; font-weight:500;">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                                        Cerrar Sesión
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </nav>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="mobile-menu-btn hidden-desktop" aria-label="Menú principal"
                aria-expanded="false">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18" />
                </svg>
            </button>
        </div>

        <!-- Mobile Navigation Drawer -->
        <nav id="mobile-menu" class="mobile-nav hidden">
            <ul class="mobile-nav-links flex flex-col">
                <li><a th:href="@{/}" class="mobile-nav-link">Inicio</a></li>
                <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}" class="mobile-nav-link">Iniciar Sesión</a>
                </li>
                <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}"
                        class="mobile-nav-link text-primary font-bold">Regístrate</a></li>

                <li sec:authorize="isAuthenticated()">
                    <div class="mobile-user-section">
                        <span class="mobile-username text-sm" sec:authentication="name">Usuario</span>
                        <div sec:authorize="hasAnyRole('ESTUDIANTE', 'USER')"><a th:href="@{/student/profile}"
                                class="mobile-nav-link">Mi Perfil</a></div>
                        <div sec:authorize="hasAnyRole('ESTUDIANTE', 'USER')"><a th:href="@{/student/history}"
                                class="mobile-nav-link">Mi Historial</a></div>
                        <div sec:authorize="hasAnyRole('VOLUNTARIO', 'USER')"><a th:href="@{/volunteer/dashboard}"
                                class="mobile-nav-link">Panel Voluntario</a></div>
                        <div sec:authorize="hasAnyRole('ADMIN', 'USER')"><a th:href="@{/admin/dashboard}"
                                class="mobile-nav-link">Administración</a></div>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="mobile-nav-link logout-btn w-full text-left">Cerrar
                                Sesión</button>
                        </form>
                    </div>
                </li>
            </ul>
        </nav>
    </header>
</body>

</html>
